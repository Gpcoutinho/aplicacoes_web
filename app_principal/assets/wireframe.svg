<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 1475" width="860" height="1475" font-family="sans-serif">
  <rect width="860" height="1475" fill="#f8f9fa"/>

  <!-- ═══ TÍTULO ════════════════════════════════════════════════════════════ -->
  <text x="430" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#2c3e50">Wireframe — Onde comer em João Pessoa</text>
  <text x="430" y="56" text-anchor="middle" font-size="11" fill="#888">Projeto Final — Engenharia de Interface HTML5/CSS3</text>

  <!-- Labels de coluna -->
  <text x="20"  y="76" font-size="12" font-weight="bold" fill="#444">🖥  Desktop (≥ 1024 px)</text>
  <text x="640" y="76" font-size="12" font-weight="bold" fill="#444">📱 Mobile (&lt; 768 px)</text>

  <!-- ═══ DESKTOP — HEADER (y=88 → y=303, h=215) ══════════════════════════ -->
  <rect x="20" y="88" width="580" height="215" rx="4" fill="#dce8f0" stroke="#7fb3d3" stroke-width="1.5"/>
  <text x="30" y="103" font-size="10" font-weight="bold" fill="#2c6e9c">HEADER</text>

  <!-- H1 rect: y=110 → y=146 (h=36) -->
  <rect x="30" y="110" width="560" height="36" rx="3" fill="#b8d4e8"/>
  <text x="310" y="131" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">H1 — Onde comer em João Pessoa</text>

  <!-- Subtitle: baseline=158  (gap de 8px abaixo do H1 rect) -->
  <text x="310" y="158" text-anchor="middle" font-size="11" fill="#555">Descubra os Melhores Sabores da Cidade</text>

  <!-- NAV rect: y=168 → y=200 (h=32)  gap=8px abaixo da subtitle -->
  <rect x="30" y="168" width="560" height="32" rx="3" fill="#a8c8e0"/>
  <text x="32"  y="178" font-size="8"  fill="#2c6e9c">NAV aria-label="Menu Principal"</text>
  <text x="115" y="188" text-anchor="middle" font-size="11" fill="#1a3a5c">Opiniões</text>
  <line x1="185" y1="169" x2="185" y2="200" stroke="#7fb3d3" stroke-width="1"/>
  <text x="280" y="188" text-anchor="middle" font-size="11" fill="#1a3a5c">📋 Critérios</text>
  <line x1="365" y1="169" x2="365" y2="200" stroke="#7fb3d3" stroke-width="1"/>
  <text x="460" y="188" text-anchor="middle" font-size="11" fill="#1a3a5c">✍️ Avaliar</text>

  <!-- VIDEO rect: y=210 → y=278 (h=68)  gap=10px abaixo da NAV -->
  <rect x="30" y="210" width="560" height="68" rx="3" fill="#c8dce8" stroke="#7fb3d3" stroke-dasharray="5,3"/>
  <text x="310" y="238" text-anchor="middle" font-size="12" fill="#555">📹  &lt;video controls poster="capa.png"&gt;</text>
  <text x="310" y="256" text-anchor="middle" font-size="10" fill="#888">section#midia  .header-midia</text>

  <!-- ═══ DESKTOP — MAIN (y=320 → y=1400, h=1080) ═════════════════════════ -->
  <!-- gap=17px abaixo do HEADER -->
  <rect x="20" y="320" width="580" height="1080" rx="4" fill="white" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="30" y="336" font-size="10" font-weight="bold" fill="#444">MAIN id="main-content"</text>

  <!-- ── SECTION #intro (y=344 → y=428, h=84)  gap=8px abaixo do label ── -->
  <rect x="30" y="344" width="560" height="84" rx="3" fill="#e8f4f8" stroke="#3498db" stroke-width="2"/>
  <text x="38"  y="358" font-size="8"  fill="#3498db">SECTION #intro .intro-section</text>
  <text x="310" y="376" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">H2 — Bem-vindo ao Onde comer em JP</text>
  <text x="310" y="394" text-anchor="middle" font-size="10" fill="#555">Texto introdutório sobre a página...</text>
  <text x="310" y="410" text-anchor="middle" font-size="10" fill="#777" font-style="italic">Texto em itálico complementar...</text>

