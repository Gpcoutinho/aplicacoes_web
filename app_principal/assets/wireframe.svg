  <text x="690" y="335" text-anchor="middle" font-size="8" fill="white">🍔 Hamburgueria</text>
  <rect x="736" y="320" width="60"  height="22" rx="3" fill="#e8e8e8"/>
  <text x="766" y="335" text-anchor="middle" font-size="8" fill="#555">🍕 Pizza ›</text>

  <!-- Mobile Article: y=354 → y=408 (h=54)  gap=12px abaixo dos botões -->
  <rect x="648" y="354" width="176" height="54" rx="2" fill="#f9f9f9"/>
  <rect x="648" y="354" width="3"   height="54" fill="#e74c3c"/>
  <text x="656" y="371" font-size="9" font-weight="bold" fill="#2c3e50">H3 — Navarros Burguer</text>
  <text x="656" y="386" font-size="8" fill="#555">⭐⭐⭐⭐⭐ 4.9 · Jardim Luna</text>
