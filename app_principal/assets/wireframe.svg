  <rect x="44"  y="1138" width="531" height="28" rx="4" fill="white" stroke="#bdc3c7"/>
  <text x="50"  y="1156" font-size="10" fill="#aaa">Prato Pedido (input type="text")</text>

  <!-- Range: label baseline=1182 (gap=16px abaixo do input) -->
  <text x="50"  y="1182" font-size="10" fill="#555">Avaliação Geral (1–10):</text>
  <rect x="44"  y="1188" width="531" height="8"  rx="4" fill="#bdc3c7"/>
  <circle cx="240" cy="1192" r="8" fill="#e74c3c"/>

  <!-- Textarea: y=1212 → y=1272 (h=60)  gap=12px abaixo do circle bottom 1200 -->
  <rect x="44"  y="1212" width="531" height="60" rx="4" fill="white" stroke="#bdc3c7"/>
  <text x="50"  y="1234" font-size="10" fill="#aaa">Avaliação Detalhada... (textarea rows="5")</text>

