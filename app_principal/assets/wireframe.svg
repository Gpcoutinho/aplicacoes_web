  <rect x="20"  y="1414" width="580" height="48" rx="4" fill="#2c3e50"/>
  <text x="310" y="1442" text-anchor="middle" font-size="12" fill="white">FOOTER — 2026 · Gabriel Coutinho e Rebecca Nery</text>

