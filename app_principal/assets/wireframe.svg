  <rect x="44"  y="1018" width="250" height="28" rx="4" fill="white" stroke="#bdc3c7"/>
  <text x="50"  y="1036" font-size="10" fill="#aaa">Nome* (input type="text")</text>
  <rect x="316" y="1018" width="259" height="28" rx="4" fill="white" stroke="#bdc3c7"/>
  <text x="322" y="1036" font-size="10" fill="#aaa">E-mail* (input type="email")</text>

