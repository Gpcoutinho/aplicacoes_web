  <rect x="44"  y="1324" width="220" height="36" rx="6" fill="#e74c3c"/>
  <text x="154" y="1347" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Enviar Minha Avaliação</text>
  <!-- button bottom=1360, form bottom=1388 → 28px padding inferior ✓ -->

