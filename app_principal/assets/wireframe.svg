  <rect x="340" y="464" width="145" height="28" rx="3" fill="#e8e8e8"/>
  <text x="412" y="482" text-anchor="middle" font-size="11" fill="#555">🦐 Frutos do Mar</text>

  <!-- Article 1: y=506 → y=596 (h=90)  label acima, gap=14px dos botões -->
  <text x="38"  y="502" font-size="8" fill="#888">article.restaurante</text>
  <rect x="30"  y="506" width="560" height="90" rx="2" fill="#f9f9f9"/>
  <rect x="30"  y="506" width="4"   height="90" fill="#e74c3c"/>
  <text x="44"  y="524" font-size="12" font-weight="bold" fill="#2c3e50">H3 — Navarros Burguer</text>
  <text x="44"  y="542" font-size="10" fill="#555">Localização: Jardim Luna  |  Tipo: Fast Food Gourmet  |  ⭐⭐⭐⭐⭐ 4.9</text>
  <text x="44"  y="558" font-size="10" fill="#555">H4 — Especialidades:  • Montagem Personalizada  • Carne Defumada  • Molhos Exclusivos</text>
  <text x="44"  y="578" font-size="10" fill="#888" font-style="italic">💡 Recomendação: Hambúrguer duplo com maionese trufada</text>

  <!-- Article 2: y=608 → y=698 (h=90)  gap=12px -->
  <rect x="30"  y="608" width="560" height="90" rx="2" fill="#f9f9f9"/>
  <rect x="30"  y="608" width="4"   height="90" fill="#e74c3c"/>
  <text x="44"  y="626" font-size="12" font-weight="bold" fill="#2c3e50">H3 — Curral Burguer</text>
  <text x="44"  y="644" font-size="10" fill="#555">Localização: Entrega em Toda a Cidade  |  Tipo: Hambúrguer Smash  |  ⭐⭐⭐⭐ 4.8</text>
  <text x="44"  y="660" font-size="10" fill="#555">H4 — Diferenciais:  • Técnica Smash  • Brioche Premium  • Picles Artesanais</text>
  <text x="44"  y="678" font-size="10" fill="#888" font-style="italic">💡 Recomendação: Combo salada com picles</text>

  <!-- Article 3: y=710 → y=800 (h=90)  gap=12px -->
  <rect x="30"  y="710" width="560" height="90" rx="2" fill="#f9f9f9"/>
  <rect x="30"  y="710" width="4"   height="90" fill="#e74c3c"/>
  <text x="44"  y="728" font-size="12" font-weight="bold" fill="#2c3e50">H3 — Gio Burguer</text>
  <text x="44"  y="746" font-size="10" fill="#555">Localização: Ipês/Estados  |  Tipo: Hamburgueria Sofisticada  |  ⭐⭐⭐⭐⭐ 4.7</text>
  <text x="44"  y="762" font-size="10" fill="#555">H4 — Diferenciais:  • Cardápio Completo  • Ambiente Acolhedor</text>
  <text x="44"  y="780" font-size="10" fill="#888" font-style="italic">💡 Recomendação: Experiência completa — entrada, burger, sobremesa</text>
  <!-- tabs bottom=810, art3 bottom=800  →  10px padding inferior ✓ -->

  <!-- ── SECTION #criterios (y=826 → y=952, h=126)  gap=16px ── -->
  <rect x="30" y="826" width="560" height="126" rx="3" fill="#fff5e6" stroke="#f39c12" stroke-width="2"/>
  <text x="38"  y="840" font-size="8"  fill="#f39c12">SECTION #criterios .criterios-section</text>
  <text x="310" y="858" text-anchor="middle" font-size="12" font-weight="bold" fill="#d68910">H2 — 📋 Como Avaliamos os Restaurantes</text>
  <text x="44"  y="876" font-size="10" fill="#555">• Qualidade dos Ingredientes    • Preparação e Técnica    • Apresentação</text>
  <text x="44"  y="894" font-size="10" fill="#555">• Atendimento    • Relação Custo-Benefício    • Ambiente    • Inovação</text>
  <text x="44"  y="912" font-size="9"  fill="#888">7 critérios avaliados em cada visita — ul &gt; li (lista não ordenada)</text>

  <!-- ── SECTION #formulario (y=968 → y=1388, h=420)  gap=16px ── -->
  <rect x="30" y="968" width="560" height="420" rx="3" fill="#f8f8ff" stroke="#bdc3c7"/>
  <text x="38"  y="982" font-size="8" fill="#888">SECTION #formulario .formulario-section  —  form[action="#" method="post"]</text>
  <text x="310" y="1002" text-anchor="middle" font-size="12" font-weight="bold" fill="#2c3e50">H2 — ✍️ Compartilhe Sua Experiência Gastronômica</text>

