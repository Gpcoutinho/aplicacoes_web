  <rect x="640" y="428" width="192" height="30" rx="4" fill="#2c3e50"/>
  <text x="736" y="447" text-anchor="middle" font-size="9" fill="white">FOOTER</text>
  <!-- footer bottom=458, phone frame bottom=470 → 12px padding inferior ✓ -->

  <!-- ═══ MOBILE — Menu overlay note (y=486 → y=554, h=68) ════════════════ -->
