  <rect x="316" y="1058" width="259" height="28" rx="4" fill="white" stroke="#bdc3c7"/>
  <text x="322" y="1076" font-size="10" fill="#aaa">Data da Visita* (input type="date")</text>

  <!-- Select restaurante: y=1098 → y=1126 (h=28)  gap=12px -->
  <rect x="44"  y="1098" width="531" height="28" rx="4" fill="white" stroke="#bdc3c7"/>
  <text x="50"  y="1116" font-size="10" fill="#aaa">Qual Restaurante Você Visitou?* (select)</text>

