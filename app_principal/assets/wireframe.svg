  <rect x="640" y="236" width="192" height="178" rx="4" fill="white" stroke="#bdc3c7"/>
  <text x="648" y="250" font-size="8" fill="#444">MAIN (coluna única)</text>

  <!-- Mobile Intro: y=256 → y=292 (h=36)  gap=6px abaixo do label -->
