  <rect x="632" y="486" width="208" height="68" rx="4" fill="#fff8e1" stroke="#f39c12" stroke-dasharray="4,3"/>
  <text x="736" y="504" text-anchor="middle" font-size="9" font-weight="bold" fill="#d68910">Menu Hamburguer (overlay)</text>
  <text x="736" y="520" text-anchor="middle" font-size="8" fill="#555">nav { position: fixed; width: 100vw }</text>
  <text x="736" y="534" text-anchor="middle" font-size="8" fill="#555">#menu-toggle:checked ~ nav { display: block }</text>
  <text x="736" y="548" text-anchor="middle" font-size="8" fill="#888">Fecha com ✕ (pseudo-element ::after)</text>

  <!-- ═══ ANOTAÇÕES (y=570 → y=810, h=240) ═══════════════════════════════ -->
  <!-- gap=16px abaixo do overlay -->
  <rect x="632" y="570" width="208" height="240" rx="4" fill="#f0f4f8" stroke="#7fb3d3"/>

  <text x="736" y="590" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c6e9c">📌 Hierarquia Semântica</text>
  <text x="642" y="608" font-size="9" fill="#333">H1 · Título da página (único por página)</text>
  <text x="642" y="624" font-size="9" fill="#333">H2 · Seções principais (intro, tabs, critérios, form)</text>
  <text x="642" y="640" font-size="9" fill="#333">H3 · Nome de cada restaurante</text>
  <text x="642" y="656" font-size="9" fill="#333">H4 · Especialidades / Diferenciais</text>

  <line x1="632" y1="668" x2="840" y2="668" stroke="#7fb3d3" stroke-width="1" stroke-dasharray="3,2"/>

  <text x="736" y="686" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c6e9c">📌 Breakpoints</text>
  <text x="642" y="704" font-size="9" fill="#333">Mobile  : &lt; 768 px  →  1 coluna, nav hamburguer</text>
  <text x="642" y="720" font-size="9" fill="#333">Tablet  : ≥ 768 px  →  padding expandido</text>
  <text x="642" y="736" font-size="9" fill="#333">Desktop : ≥ 1024 px →  padding maior</text>

  <line x1="632" y1="748" x2="840" y2="748" stroke="#7fb3d3" stroke-width="1" stroke-dasharray="3,2"/>

  <text x="736" y="766" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c6e9c">📌 Acessibilidade</text>
  <text x="642" y="784" font-size="9" fill="#555">• Skip link: "Pular para conteúdo"</text>
  <text x="642" y="800" font-size="9" fill="#555">• aria-label no &lt;nav&gt;</text>
